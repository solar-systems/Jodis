# Jodis Logging Configuration
# Global logging level
.level=INFO

# Enable DEBUG level logging for cn.abelib.jodis package
cn.abelib.jodis.level=FINE

# Console handler configuration
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.ConsoleHandler.formatter.format=[%1$tF %1$tT] [%4$-7s] %5$s %n

# File handler (optional)
# java.util.logging.FileHandler.level=FINE
# java.util.logging.FileHandler.pattern=log/jodis.log
# java.util.logging.FileHandler.limit=10000000
# java.util.logging.FileHandler.count=5
# java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter